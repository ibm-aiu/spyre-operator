apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    pv.kubernetes.io/provisioned-by: nfs.csi.k8s.io
  name: cardmgmt-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
  - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete
  mountOptions:
  - nfsvers=4.1
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: cardmgmt-nfs-server.cardmgmt-nfs.svc.cluster.local/share##
    volumeAttributes:
      server: cardmgmt-nfs-server.cardmgmt-nfs.svc.cluster.local
      share: /
