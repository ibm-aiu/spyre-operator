apiVersion: v1
kind: Pod
metadata:
  name: small-toy
spec:
  schedulerName: spyre-scheduler
  restartPolicy: Never
  containers:
  - name: app
    imagePullPolicy: Always
    image: docker.io/spyre-operator/1.0/x86_64/spyre:dev
    command:
    - /usr/bin/bash
    - -lc
    - /home/senuser/entry.sh
    resources:
      limits:
        "ibm.com/spyre_vf": "1"
    env:
    - name: HOME
      value: /home/senuser
    - name: FLEX_COMPUTE
      value: SENTIENT
    - name: FLEX_DEVICE
      value: VF
    - name: DTLOG_LEVEL
      value: "info"
    - name: TORCH_SENDNN_LOG
      value: "CRITICAL"
    - name: DT_DEEPRT_VERBOSE
      value: "-1"
    workingDir: /home/senuser
    volumeMounts:
    - mountPath: /dev/shm
      name: dev-shm
    - name: config-volume
      mountPath: /home/senuser/entry.sh
      subPath: entry.sh
    - name: config-volume
      mountPath: /tmp/dd2.json
      subPath: dd2.json
    terminationMessagePolicy: FallbackToLogsOnError
  volumes:
  - name: config-volume
    configMap:
      name: small-toy-config
      defaultMode: 0777
  - name: dev-shm
    emptyDir:
      medium: Memory
      sizeLimit: 8G
