apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    kubernetes.io/arch: amd64
    machineconfiguration.openshift.io/role: worker
  name: 08-pciacs-v1
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
      - contents:
          source: data:text/plain;charset=utf-8;base64,
        mode: 700
        overwrite: true
        path: /usr/local/bin/pciacs.pl
    systemd:
      units:
      - contents: |
          [Unit]
          Description=Performing PCIe switch configuration
          After=kubelet.service
          [Service]
          Type=simple
          ExecStart=/bin/bash -c "/bin/sleep 330; /usr/local/bin/pciacs.pl"
          [Install]
          WantedBy=multi-user.target
        enabled: true
        name: pcieacs.service
