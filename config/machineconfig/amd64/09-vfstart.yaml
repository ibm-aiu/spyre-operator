apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    kubernetes.io/arch: amd64
    machineconfiguration.openshift.io/role: vf
  name: 09-vfstart
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
      - contents:
          source: data:text/plain;charset=utf-8;base64,
        mode: 700
        overwrite: true
        path: /usr/local/bin/vfio_start.sh
    systemd:
      units:
      - contents: |
          [Unit]
          Description=Create Spyre virtual functions
          After=kubelet.service

          [Service]
          Type=simple
          ExecStart=/bin/bash -c "/bin/sleep 300; /usr/local/bin/vfio_start.sh"

          [Install]
          WantedBy=multi-user.target
        enabled: true
        name: vfstart.service
