apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spyre-webhook-validator
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  - extensions
  resources:
  - jobs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - spyre.ibm.com
  resources:
  - spyreclusterpolicies
  - spyreclusterpolicies/status
  verbs:
  - get
  - list
  - watch
