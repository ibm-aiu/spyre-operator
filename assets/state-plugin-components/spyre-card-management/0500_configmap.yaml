apiVersion: v1
kind: ConfigMap
metadata:
  name: spyre-cardmgmt-config
  namespace: "FILLED BY THE OPERATOR"
data:
  aiucardmgmt.ini: |-
    [general]
    # use "|" as a separator for list of cards. Use dot "." to match all cards
    aiufilter               = FILTER BY THE OPERATOR
    use_vfs                 = False
    kubenamespace           = FILLED BY THE OPERATOR
    resource_prefix         = ibm.com/spyre_
    second_scheduler        = spyre-scheduler
    image_pull_secret_path  = /var/imagepullsecret/.dockerconfigjson

    [image]
    pfimage_URL             = PFIMAGE BY THE OPERATOR
    vfimage_URL             = VFIMAGE BY THE OPERATOR

    [log_level]
    # trace, debug, info, warning, error, fatal
    SENLIB_PF_LOG_LEVEL     = info
    SENLIB_VF_LOG_LEVEL     = info
    # debug, info, warning, error, critical
    CM_LOG_LEVEL            = info
    CM_VF_LOG_LEVEL         = info
    CM_PF_LOG_LEVEL         = info
