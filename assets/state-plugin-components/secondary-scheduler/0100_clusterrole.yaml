apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spyre-resources
rules:
- apiGroups: ["spyre.ibm.com"]
  resources:
  - spyrenodestates
  - spyrenodestates/status
  - spyreclusterpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups: ["storage.k8s.io"]
  resources:
  - volumeattachments
  verbs:
  - get
  - list
  - watch
